#
# openocd-hc32f460.cfg
#
# Minimal SWD attach config for HC32F460 live debugging.
#
# Notes:
# - This file is mainly for debug / inspection, not the preferred flashing path.
# - Direct flashing is simpler with pyOCD:
#     pip install pyocd
#     pyocd pack install hc32f460
#     pyocd load /path/to/firmware.bin -t hc32f460 -a 0xC000
# - Typical probe used during bring-up:
#     Raspberry Pi PicoProbe (debugprobe_on_pico.uf2)
#     GP2 -> SWCLK
#     GP3 -> SWDIO
#     GND -> GND
#
# Suggested Linux udev rule for the PicoProbe CMSIS-DAP interface:
#   echo 'ATTRS{idVendor}=="2e8a", ATTRS{idProduct}=="000c", MODE="660", GROUP="plugdev", TAG+="uaccess"' | sudo tee /etc/udev/rules.d/99-pico-debug.rules
#   sudo udevadm control --reload-rules && sudo udevadm trigger
#

source [find interface/cmsis-dap.cfg]

adapter speed 1000
transport select swd

set _CHIPNAME hc32f460
set _CPUTAPID 0x2ba01477

source [find target/swj-dp.tcl]

swj_newdap $_CHIPNAME cpu -expected-id $_CPUTAPID
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
target create $_CHIPNAME.cpu cortex_m -dap $_CHIPNAME.dap

reset_config srst_nogate connect_assert_srst
